services:
  - type: web
    name: aquaexpert-customer-workbooks
    runtime: static
    autoDeploy: true
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_BASE_URL
        sync: false
